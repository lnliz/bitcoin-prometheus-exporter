name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: |
          go test -v ./...

      # integration tests with real bitcoinrpc.xyz rpc server
      - run: |
          REAL_RPC_TESTS=1 \
          REAL_RPC_HOST=bitcoinrpc.xyz:2082 \
          REAL_RPC_USER=user \
          REAL_RPC_PASSWORD=pwd \
          go test -v ./...

